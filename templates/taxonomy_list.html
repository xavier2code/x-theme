{% extends "base.html" %}

{% block content %}
<h1 style="margin-bottom: 2rem; border-bottom: 3px solid black; padding-bottom: 1rem;">
    {{ taxonomy.name }}
</h1>

<div class="archive-grid">
    {% for term in terms %}
    <article class="card">
        <h2 class="card-title">
            <a href="{{ term.permalink }}">{{ term.name }}</a>
        </h2>
        <p class="card-meta">{{ term.pages | length }} {{ trans(key="posts", lang=lang) }}</p>
    </article>
    {% endfor %}
</div>
{% endblock %}
