<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }}{% endblock %}</title>
    
    <!-- Google Fonts: Playfair Display + Noto Serif SC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ get_url(path="main.css") }}">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-links">
                <a href="{{ get_url(path="/") }}" class="nav-link {% if current_path == "/" %}active{% endif %}">HOME</a>
                <a href="{{ get_url(path="archives") }}" class="nav-link {% if current_path == "/archives" %}active{% endif %}">ARCHIVE</a>
                <a href="{{ get_url(path="tags") }}" class="nav-link {% if current_path is starting_with("/tags") %}active{% endif %}">TAGS</a>
                <a href="{{ get_url(path="categories") }}" class="nav-link {% if current_path is starting_with("/categories") %}active{% endif %}">CATEGORIES</a>
                <a href="{{ get_url(path="about") }}" class="nav-link {% if current_path == "/about" %}active{% endif %}">ABOUT</a>
                <a href="{{ get_url(path="contact") }}" class="nav-link {% if current_path == "/contact" %}active{% endif %}">CONTACT</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <!-- Marquee Ticker -->
    {% if config.extra.marquee_text %}
    <div class="marquee">
        <div class="marquee-content">
            <span>{{ config.extra.marquee_text }}</span>
            <span aria-hidden="true">{{ config.extra.marquee_text }}</span>
        </div>
    </div>
    {% endif %}

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; {{ now() | date(format="%Y") }} {{ config.title }}. Built with Zola.</p>
            <div class="social-links">
                <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
                <a href="https://twitter.com" target="_blank" rel="noopener">Twitter</a>
            </div>
        </div>
    </footer>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const toggle = document.querySelector('.nav-toggle');
    const links = document.querySelector('.nav-links');
    
    if (toggle && links) {
        toggle.addEventListener('click', function() {
            toggle.classList.toggle('open');
            links.classList.toggle('open');
        });
    }
});
</script>
</body>
</html>
